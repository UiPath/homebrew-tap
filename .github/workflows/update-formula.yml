name: Update formula

on:
  schedule:
    # Twice daily (07:17 and 19:17 UTC). Off-the-hour offset avoids GitHub's top-of-hour cron surge.
    - cron: "17 7,19 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Force a specific version (leave blank to use npm latest)"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: vars
        name: Resolve latest version and compare
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version }}" ]]; then
            LATEST="${{ inputs.version }}"
          else
            LATEST=$(curl -fsSL --retry 3 --retry-delay 5 https://registry.npmjs.org/@uipath/cli/latest | jq -r .version)
          fi
          CURRENT=$(sed -nE 's/^\s*version "([^"]+)".*/\1/p' Formula/uip.rb)
          echo "Latest:  $LATEST"
          echo "Current: $CURRENT"
          if [[ "$LATEST" == "$CURRENT" ]]; then
            echo "Formula already on $LATEST — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          URL="https://registry.npmjs.org/@uipath/cli/-/cli-$LATEST.tgz"
          SHA=$(curl -fsSL --retry 5 --retry-delay 10 --retry-all-errors "$URL" | sha256sum | awk '{print $1}')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"        >> "$GITHUB_OUTPUT"

      - name: Rewrite Formula/uip.rb
        if: steps.vars.outputs.skip != 'true'
        run: |
          set -euo pipefail
          sed -i -E 's|^(\s*version )".*"|\1"${{ steps.vars.outputs.version }}"|' Formula/uip.rb
          sed -i -E 's|^(\s*sha256 )".*"|\1"${{ steps.vars.outputs.sha }}"|' Formula/uip.rb

      - uses: peter-evans/create-pull-request@v6
        if: steps.vars.outputs.skip != 'true'
        with:
          commit-message: "uip ${{ steps.vars.outputs.version }}"
          title: "uip ${{ steps.vars.outputs.version }}"
          body: |
            Automated bump: `@uipath/cli` on npm is now `${{ steps.vars.outputs.version }}`.

            - version: `${{ steps.vars.outputs.version }}`
            - sha256:  `${{ steps.vars.outputs.sha }}`
          branch: bump/uip-${{ steps.vars.outputs.version }}
          delete-branch: true
